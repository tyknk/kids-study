<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>棒グラフと表 もんだい</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=Kaisei+Decol:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --am:    #D97706;
  --am-lt: #FFFBEB;
  --am-dk: #92400E;
  --am-mid:#B45309;
  --bar:   #F59E0B;
  --bar-hl:#D97706;
  --ok:    #78D98A;
  --ng:    #FF8FAA;
  --text:  #1e293b;
  --muted: #64748b;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
ruby { ruby-align: center; }
rt { font-size: 0.55em; font-weight: 400; }
body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: var(--am-lt);
  color: var(--text);
  height: 100svh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

/* HOME BAR */
.home-bar { width: 100%; display: flex; justify-content: flex-start; margin-bottom: 8px; }
.btn-home {
  background: white; border: 2px solid var(--am); color: var(--am-dk);
  border-radius: 20px; padding: 8px 18px;
  font-size: clamp(0.8rem,2.5vw,1rem); font-family: inherit; font-weight: 700;
  cursor: pointer; min-height: 44px;
}
.btn-home:active { transform: translateY(1px); }
@media (hover:hover) { .btn-home:hover { background: #FEF3C7; transition: background .15s; } }

/* SCREENS */
.screen { display: none; width: min(900px, 92vw); height: 100%; min-height: 0; }
.screen.active {
  display: flex; flex-direction: column; overflow: hidden;
  padding-top: max(env(safe-area-inset-top),10px);
  padding-bottom: max(env(safe-area-inset-bottom),10px);
}

/* START */
.start-body {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: clamp(14px,3vh,36px);
  overflow-y: auto; min-height: 0; width: 100%;
}
.title-block { text-align: center; }
.title-icon { font-size: clamp(3rem,8vw+3vh,6rem); line-height: 1.2; }
.title-main {
  font-family: 'Kaisei Decol', serif;
  font-size: clamp(1.6rem,3.5vw+2vh,4rem);
  color: var(--am-dk); font-weight: 700;
}
.title-sub { font-size: clamp(0.85rem,2.4vw,1rem); color: #888; margin-top: 6px; }
.start-cards { display: flex; flex-direction: column; gap: clamp(12px,2vh,20px); width: 100%; max-width: 560px; }
.start-card {
  background: white; border-radius: 20px;
  padding: clamp(16px,2.5vh,28px) 22px;
  display: flex; align-items: center; gap: 16px;
  box-shadow: 0 2px 8px rgba(217,119,6,.14);
  cursor: pointer; border: 3px solid transparent; min-height: 80px;
}
.start-card:active { border-color: var(--am); }
@media (hover:hover) {
  .start-card { transition: transform .15s, box-shadow .15s, border-color .15s; }
  .start-card:hover { border-color: var(--am); box-shadow: 0 6px 20px rgba(217,119,6,.22); transform: translateY(-2px); }
}
.card-icon { font-size: 2.2rem; flex-shrink: 0; }
.card-text { flex: 1; }
.card-title { font-size: clamp(1.1rem,2vw+1.2vh,2rem); font-weight: 700; color: var(--am-dk); }
.card-desc { font-size: clamp(0.8rem,2.2vw,0.9rem); color: #888; margin-top: 3px; }
.card-arrow { font-size: 1.5rem; color: var(--am); flex-shrink: 0; }

/* LESSON */
.lesson-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 0 4px; flex-shrink: 0; }
.lesson-step-label { font-size: clamp(0.8rem,1.5vw+0.5vh,1rem); color: var(--muted); font-weight: 700; }
.lesson-step-dots { display: flex; gap: 8px; }
.lesson-dot { width: 10px; height: 10px; border-radius: 50%; background: #FDE68A; transition: background .2s; }
.lesson-dot.active { background: var(--am); }
.lesson-dot.done   { background: var(--am-dk); }
.lesson-title {
  font-family: 'Kaisei Decol', serif;
  font-size: clamp(1.1rem,2.2vw+1.3vh,1.8rem);
  font-weight: 700; color: var(--am-dk);
  text-align: center; padding: 6px 0; flex-shrink: 0;
}
.lesson-content {
  flex: 1; min-height: 0; overflow-y: auto;
  padding: 6px 4px 10px;
  display: flex; flex-direction: column; gap: clamp(8px,1.8vh,16px);
}
.lesson-content p { font-size: clamp(0.9rem,1.8vw+1vh,1.2rem); line-height: 1.85; }
.lesson-content strong { color: var(--am-dk); }
.lesson-note {
  background: #FEF9C3; border-left: 4px solid #FDE047;
  border-radius: 0 8px 8px 0; padding: 8px 12px;
  font-size: clamp(0.82rem,1.4vw+0.6vh,1rem); color: #713F12;
}
.lesson-footer {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0 4px; flex-shrink: 0; gap: 12px;
}
.btn-prev, .btn-next-lesson {
  border: none; border-radius: 12px;
  padding: clamp(10px,2vh,14px) clamp(16px,3vw,26px);
  font-family: inherit; font-size: clamp(0.95rem,1.8vw+1vh,1.2rem);
  font-weight: 700; cursor: pointer; transition: all .15s;
}
.btn-prev { background: #E2E8F0; color: var(--muted); }
.btn-prev:active { transform: translateY(1px); }
@media (hover:hover) { .btn-prev:hover { background: #CBD5E1; } }
.btn-next-lesson { background: var(--am); color: white; box-shadow: 0 3px 10px rgba(217,119,6,.3); flex: 1; }
.btn-next-lesson:active { transform: translateY(1px); }
@media (hover:hover) { .btn-next-lesson:hover { background: var(--am-dk); } }

/* ── Lesson bar graph ── */
.lesson-graph { background: white; border-radius: 14px; border: 2px solid #FDE68A; padding: 10px; }
.lg-title { text-align: center; font-weight: 700; font-size: clamp(0.78rem,1.4vw+0.5vh,0.9rem); margin-bottom: 6px; }
.lg-scale-row {
  display: flex; align-items: flex-end; padding-left: 66px;
  margin-bottom: 3px; position: relative; height: 16px;
}
.lg-tick {
  position: absolute; font-size: 0.6rem; color: #888;
  transform: translateX(-50%); bottom: 0;
}
.lg-row { display: flex; align-items: center; height: 26px; margin-bottom: 3px; }
.lg-label {
  flex-shrink: 0; text-align: right; padding-right: 6px;
  font-size: clamp(0.62rem,1.1vw,0.75rem); font-weight: 700;
  white-space: nowrap;
}
.lg-track {
  flex: 1; height: 20px; border-radius: 3px; position: relative; overflow: visible;
  background: repeating-linear-gradient(to right,
    transparent, transparent calc(var(--t-w) - 0.5px),
    rgba(0,0,0,.08) calc(var(--t-w) - 0.5px), rgba(0,0,0,.08) var(--t-w)
  ), #F9FAFB;
}
.lg-bar {
  position: absolute; left: 0; top: 0; bottom: 0;
  border-radius: 0 4px 4px 0; background: var(--bar); transition: width .4s;
}
.lg-bar.lg-hl { background: var(--bar-hl); }
.lg-unit { text-align: right; font-size: 0.62rem; color: #888; margin-top: 4px; }

/* ── Lesson table ── */
.lesson-table-wrap { overflow-x: auto; border-radius: 10px; }
.lesson-tbl {
  width: 100%; border-collapse: collapse;
  border: 2px solid var(--am); border-radius: 10px; overflow: hidden;
}
.lesson-tbl th, .lesson-tbl td {
  padding: 5px 8px; text-align: center;
  border: 1px solid rgba(180,83,9,.2);
  font-size: clamp(0.7rem,1.3vw+0.5vh,0.88rem);
}
.lesson-tbl th { background: var(--am); color: white; font-weight: 700; }
.lesson-tbl td { background: #FFFBEB; }
.lesson-tbl td.hl { background: #FDE68A; font-weight: 700; }
.lesson-tbl tr.total td { background: #FED7AA; font-weight: 700; }

/* QUIZ */
.quiz-header { padding: 8px 0 4px; flex-shrink: 0; }
.progress-bar-wrap { height: 8px; background: #E2E8F0; border-radius: 4px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--am); border-radius: 4px; transition: width .3s; }
.quiz-counter { text-align: right; font-size: clamp(0.78rem,1.4vw+0.5vh,0.9rem); color: var(--muted); margin-top: 4px; }

.quiz-body {
  flex: 1; min-height: 0; display: flex; flex-direction: column;
  gap: clamp(6px,1.2vh,12px); overflow-y: auto;
}

.q-badge {
  display: inline-block; padding: 3px 12px; border-radius: 20px;
  font-size: clamp(0.72rem,1.2vw+0.5vh,0.88rem); font-weight: 700; align-self: flex-start;
}
.badge-bar   { background: #FEF3C7; color: #92400E; }
.badge-tbl   { background: #DBEAFE; color: #1D4ED8; }

.q-card {
  background: white; border-radius: 16px;
  padding: clamp(10px,2vh,16px) clamp(12px,2.5vw,18px);
  box-shadow: 0 2px 12px rgba(0,0,0,.07);
  display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
}
.q-label { font-size: clamp(0.88rem,1.6vw+0.8vh,1.1rem); color: var(--muted); }
.q-text { font-size: clamp(1rem,1.8vw+1vh,1.3rem); font-weight: 700; color: var(--am-dk); }

/* ── Quiz bar graph ── */
.qbg { padding: 0 2px; }
.qbg-title { text-align: center; font-weight: 700; font-size: clamp(0.72rem,1.3vw+0.4vh,0.85rem); margin-bottom: 5px; }
.qbg-scale {
  display: flex; height: 14px; padding-left: 62px; margin-bottom: 2px; position: relative;
}
.qbg-tick {
  position: absolute; font-size: 0.58rem; color: #888; transform: translateX(-50%); bottom: 0;
}
.qbg-row { display: flex; align-items: center; height: 24px; margin-bottom: 2px; }
.qbg-label {
  flex-shrink: 0; text-align: right; padding-right: 5px;
  font-size: clamp(0.58rem,1vw,0.72rem); font-weight: 700;
  white-space: nowrap;
}
.qbg-track {
  flex: 1; height: 18px; position: relative;
  border-radius: 3px;
  background: repeating-linear-gradient(to right,
    transparent, transparent calc(var(--tw) - 0.5px),
    rgba(0,0,0,.08) calc(var(--tw) - 0.5px), rgba(0,0,0,.08) var(--tw)
  ), #F9FAFB;
}
.qbg-bar {
  position: absolute; left: 0; top: 0; bottom: 0;
  border-radius: 0 3px 3px 0; background: var(--bar);
}
.qbg-bar.qbg-hl { background: var(--bar-hl); }
.qbg-unit { text-align: right; font-size: 0.58rem; color: #888; margin-top: 3px; }

/* ── Quiz table ── */
.q-tbl-wrap { overflow-x: auto; }
.q-tbl {
  width: 100%; border-collapse: collapse;
  border: 2px solid var(--am); border-radius: 8px; overflow: hidden;
}
.q-tbl th, .q-tbl td {
  padding: 5px 6px; text-align: center;
  border: 1px solid rgba(180,83,9,.2);
  font-size: clamp(0.68rem,1.2vw+0.5vh,0.84rem);
}
.q-tbl th { background: var(--am); color: white; font-weight: 700; }
.q-tbl td { background: #FFFBEB; }
.q-tbl td.hl { background: #FDE68A; font-weight: 700; color: var(--am-dk); }
.q-tbl tr.total td { background: #FED7AA; font-weight: 700; }

/* Choices */
.choices-grid {
  display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
  gap: clamp(6px,1.2vw,12px); flex: 1; min-height: 0;
}
.choice-btn {
  background: white; border: 2.5px solid #CBD5E1; border-radius: 14px; padding: 8px;
  font-family: inherit; font-size: clamp(0.95rem,1.7vw+1vh,1.4rem);
  font-weight: 700; color: var(--text); cursor: pointer; transition: all .15s;
  display: flex; align-items: center; justify-content: center;
  text-align: center; line-height: 1.35; word-break: break-all;
}
.choice-btn:active { transform: translateY(1px); }
@media (hover:hover) { .choice-btn:hover:not(:disabled) { border-color: var(--am); background: #FEF3C7; } }
.choice-btn:disabled { cursor: default; }
.choice-btn.correct { border-color: var(--ok); background: #F0FFF4; color: #166534;
  animation: btn-correct .45s cubic-bezier(.34,1.56,.64,1) forwards; }
.choice-btn.wrong   { border-color: var(--ng); background: #FFF0F4; color: #9F1239; }
@keyframes btn-correct {
  0%  { transform:scale(1); }
  45% { transform:scale(1.1); box-shadow:0 0 0 6px rgba(120,217,138,.3); }
  75% { transform:scale(0.97); }
  100%{ transform:scale(1.04); }
}

/* Confetti */
.confetti-piece { position:fixed; pointer-events:none; z-index:300; animation:confetti-fly linear forwards; }
@keyframes confetti-fly {
  0%  { opacity:1; }
  80% { opacity:1; }
  100%{ opacity:0; transform:translateY(var(--dy)) translateX(var(--dx)) rotate(var(--rot)); }
}

/* Feedback */
.fb-area { flex-shrink:0; min-height:52px; display:flex; flex-direction:column; gap:5px; }
.fb-result { font-size:clamp(1.1rem,2vw+1.2vh,1.5rem); font-weight:900; text-align:center; }
.fb-result.ok { color:#166534; animation:fb-pop .4s cubic-bezier(.34,1.56,.64,1) forwards; }
.fb-result.ng { color:#9F1239; animation:fb-shake .4s ease-out forwards; }
@keyframes fb-pop   { 0%{transform:scale(.4);opacity:0;} 65%{transform:scale(1.2);opacity:1;} 100%{transform:scale(1);opacity:1;} }
@keyframes fb-shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-6px);} 50%{transform:translateX(6px);} 75%{transform:translateX(-4px);} }
.fb-correct-ans { font-size:clamp(0.85rem,1.5vw+0.8vh,1rem); color:var(--muted); text-align:center; }

.exp-panel {
  background:#FFFBEB; border-left:4px solid #FCD34D;
  border-radius:0 12px 12px 0; padding:10px 14px;
  font-size:clamp(0.8rem,1.5vw+0.7vh,0.98rem); color:#78350F; line-height:1.75;
}
.exp-panel strong { color:#92400E; }

.btn-next-quiz {
  display:none; background:var(--am); color:white; border:none; border-radius:12px;
  padding:clamp(10px,2vh,14px); font-family:inherit;
  font-size:clamp(1rem,1.8vw+1vh,1.3rem); font-weight:700; cursor:pointer;
  box-shadow:0 3px 10px rgba(217,119,6,.3); transition:all .15s; flex-shrink:0;
}
.btn-next-quiz.visible { display:block; }
.btn-next-quiz:active { transform:translateY(1px); }
@media (hover:hover) { .btn-next-quiz:hover { background:var(--am-dk); } }

/* RESULT */
.result-body {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:clamp(14px,2.5vh,24px); padding:16px; text-align:center;
}
.result-icon { font-size:clamp(3rem,6vw+4vh,5rem); }
.result-title { font-family:'Kaisei Decol',serif; font-size:clamp(1.4rem,2.8vw+2vh,2.4rem); font-weight:700; color:var(--am-dk); }
.result-score { font-size:clamp(2rem,4vw+3vh,3.5rem); font-weight:900; color:var(--am-mid); }
.result-msg   { font-size:clamp(0.95rem,1.8vw+1vh,1.2rem); color:var(--muted); }
.result-btns  { display:flex; flex-direction:column; gap:12px; width:100%; max-width:320px; }
.btn-retry, .btn-home-result {
  border:none; border-radius:14px; padding:clamp(12px,2.2vh,17px);
  font-family:inherit; font-size:clamp(1rem,1.8vw+1vh,1.3rem); font-weight:700; cursor:pointer; transition:all .15s;
}
.btn-retry { background:var(--am); color:white; box-shadow:0 3px 10px rgba(217,119,6,.3); }
.btn-retry:active { transform:translateY(1px); }
@media (hover:hover) { .btn-retry:hover { background:var(--am-dk); } }
.btn-home-result { background:#E2E8F0; color:var(--muted); }
@media (hover:hover) { .btn-home-result:hover { background:#CBD5E1; } }

/* POPUP */
.popup-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; align-items:center; justify-content:center; }
.popup-overlay.show { display:flex; }
.popup-box { background:white; border-radius:20px; padding:28px 22px; width:min(360px,88vw); text-align:center; display:flex; flex-direction:column; gap:14px; }
.popup-msg { font-size:clamp(1rem,3vw,1.2rem); font-weight:700; color:#333; line-height:1.7; }
.popup-btns { display:flex; gap:12px; justify-content:center; }
.btn-popup { flex:1; padding:14px; border-radius:12px; border:none; font-size:clamp(0.9rem,2.5vw,1rem); font-family:inherit; font-weight:700; cursor:pointer; min-height:44px; }
.btn-popup:active { transform:translateY(1px); }
.btn-popup.cancel { background:#eee; color:#555; }
.btn-popup.go     { background:var(--am); color:white; }
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="screen-start" class="screen active">
  <div class="home-bar">
    <button class="btn-home" onclick="directHome()">🏠 まなびのへや</button>
  </div>
  <div class="start-body">
    <div class="title-block">
      <div class="title-icon">📊</div>
      <div class="title-main"><ruby>棒<rt>ぼう</rt></ruby>グラフと<ruby>表<rt>ひょう</rt></ruby></div>
      <div class="title-sub">小学3年生・算数「<ruby>棒<rt>ぼう</rt></ruby>グラフと<ruby>表<rt>ひょう</rt></ruby>」</div>
    </div>
    <div class="start-cards">
      <div class="start-card" onclick="startLesson()">
        <div class="card-icon">📖</div>
        <div class="card-text">
          <div class="card-title">まなぶ</div>
          <div class="card-desc">グラフのよみかた・表のよみかたを かくにん</div>
        </div>
        <div class="card-arrow">›</div>
      </div>
      <div class="start-card" onclick="startQuiz()">
        <div class="card-icon">✏️</div>
        <div class="card-text">
          <div class="card-title">もんだいを といてみる</div>
          <div class="card-desc">12もん チャレンジ！</div>
        </div>
        <div class="card-arrow">›</div>
      </div>
    </div>
  </div>
</div>

<!-- LESSON SCREEN -->
<div id="screen-lesson" class="screen">
  <div class="home-bar">
    <button class="btn-home" onclick="directHome()">🏠 まなびのへや</button>
  </div>
  <div class="lesson-header">
    <div class="lesson-step-label" id="lesson-step-label">レッスン 1/4</div>
    <div class="lesson-step-dots" id="lesson-step-dots"></div>
  </div>
  <div class="lesson-title" id="lesson-title"></div>
  <div class="lesson-content" id="lesson-content"></div>
  <div class="lesson-footer">
    <button class="btn-prev" id="btn-lesson-prev" onclick="lessonPrev()">◀ もどる</button>
    <button class="btn-next-lesson" id="btn-lesson-next" onclick="lessonNext()">つぎへ ▶</button>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div id="screen-quiz" class="screen">
  <div class="home-bar">
    <button class="btn-home" onclick="requestHome()">🏠 まなびのへや</button>
  </div>
  <div class="quiz-header">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
    <div class="quiz-counter" id="quiz-counter"></div>
  </div>
  <div class="quiz-body">
    <span class="q-badge" id="q-badge"></span>
    <div class="q-card" id="q-card"></div>
    <div class="choices-grid" id="choices-grid"></div>
    <div class="fb-area" id="fb-area"></div>
    <button class="btn-next-quiz" id="btn-next-quiz" onclick="nextQuestion()">つぎの もんだい ▶</button>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="screen-result" class="screen">
  <div class="home-bar">
    <button class="btn-home" onclick="directHome()">🏠 まなびのへや</button>
  </div>
  <div class="result-body">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-score" id="result-score"></div>
    <div class="result-msg" id="result-msg"></div>
    <div class="result-btns">
      <button class="btn-retry" onclick="startQuiz()">もう一かい ちょうせん</button>
      <button class="btn-home-result" onclick="directHome()">🏠 まなびのへやへ</button>
    </div>
  </div>
</div>

<!-- HOME CONFIRM POPUP -->
<div class="popup-overlay" id="popup-home">
  <div class="popup-box">
    <div class="popup-msg">もどると　いまの もんだいは<br>きえるよ。「まなびのへや」に もどる？</div>
    <div class="popup-btns">
      <button class="btn-popup cancel" onclick="closeHomePopup()">つづける</button>
      <button class="btn-popup go" onclick="directHome()">もどる</button>
    </div>
  </div>
</div>

<script>
const MODULE_ID    = 'math-bargraph-table-mondai';
const SESSION_COUNT = 12;

// ── Helpers ──
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Bar graph renderer ──
function renderBarGraph(gk, hlList, mode) {
  const G = GRAPHS[gk];
  const prefix = mode === 'lesson' ? 'lg' : 'qbg';
  const labelW = mode === 'lesson' ? 86 : 78;  // 折り返し防止のため広め
  const maxS = G.maxScale;

  const tickStep = maxS <= 10 ? 2 : 5;
  const ticks = [];
  for (let t = 0; t <= maxS; t += tickStep) ticks.push(t);
  const twPct = (tickStep / maxS * 100).toFixed(2) + '%';

  let html = `<div class="${prefix}">`;
  html += `<div class="${prefix}-title">${G.title}</div>`;

  // 目盛り行：スペーサー＋バー領域に対して絶対配置
  html += `<div style="display:flex;margin-bottom:3px;">`;
  html += `<div style="width:${labelW}px;flex-shrink:0;"></div>`;
  html += `<div style="flex:1;position:relative;height:16px;">`;
  ticks.forEach(t => {
    const pct = (t / maxS * 100).toFixed(2);
    html += `<span style="position:absolute;left:${pct}%;transform:translateX(-50%);font-size:0.6rem;color:#888;bottom:0;white-space:nowrap;">${t}</span>`;
  });
  html += '</div></div>';

  // バー行
  G.data.forEach(d => {
    const pct = (d.val / maxS * 100).toFixed(2);
    const isHl = hlList && hlList.includes(d.label);
    html += `<div class="${prefix}-row">
      <div class="${prefix}-label" style="width:${labelW}px">${d.label}</div>
      <div class="${prefix}-track" style="--${mode==='lesson'?'t-w':'tw'}:${twPct}">
        <div class="${prefix}-bar${isHl?' '+prefix+'-hl':''}" style="width:${pct}%"></div>
      </div>
    </div>`;
  });

  html += `<div class="${prefix}-unit" style="padding-left:${labelW}px;">(${G.unit})</div></div>`;
  return html;
}

// ── Table renderer ──
function renderTableHTML(hlRow, hlCol) {
  const T = TABLE;
  let html = `<div class="q-tbl-wrap"><table class="q-tbl"><thead><tr>`;
  html += `<th></th>`;
  T.cols.forEach(c => { html += `<th>${c}</th>`; });
  html += '</tr></thead><tbody>';
  T.rows.forEach(r => {
    const rowClass = r.isTotal ? ' class="total"' : '';
    html += `<tr${rowClass}><th>${r.label}</th>`;
    T.cols.forEach((c, ci) => {
      const isHl = (r.label === hlRow && c === hlCol);
      html += `<td${isHl ? ' class="hl"' : ''}>${r.vals[ci]}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

// ── Lesson table renderer ──
function renderLessonTable(hlRow, hlCol) {
  const T = TABLE;
  let html = `<div class="lesson-table-wrap"><table class="lesson-tbl"><thead><tr>`;
  html += `<th></th>`;
  T.cols.forEach(c => { html += `<th>${c}</th>`; });
  html += '</tr></thead><tbody>';
  T.rows.forEach(r => {
    const rowClass = r.isTotal ? ' class="total"' : '';
    html += `<tr${rowClass}><th style="background:var(--am);color:white;font-weight:700">${r.label}</th>`;
    T.cols.forEach((c, ci) => {
      const isHl = (hlRow && r.label === hlRow && c === hlCol);
      html += `<td${isHl ? ' class="hl"' : ''}>${r.vals[ci]}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

// ── Confetti ──
function launchConfetti() {
  const colors = ['#FFD700','#FF6B6B','#4ECDC4','#A78BFA','#F472B6','#34D399','#FBBF24','#60A5FA'];
  const cx = window.innerWidth / 2, cy = window.innerHeight * 0.55;
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const size = 7 + Math.random() * 8;
    const angle = Math.random() * Math.PI * 2;
    const dist = 130 + Math.random() * 150;
    const dx = Math.cos(angle) * dist;
    const dy = -(60 + Math.random() * 180);
    const rot = (Math.random() - 0.5) * 720;
    const dur = 0.7 + Math.random() * 0.6;
    el.style.cssText = `left:${cx}px;top:${cy}px;width:${size}px;height:${size * (Math.random() > .5 ? 1 : 2.2)}px;background:${colors[i % colors.length]};border-radius:${Math.random() > .4 ? '50%' : '2px'};--dx:${dx}px;--dy:${dy}px;--rot:${rot}deg;animation-duration:${dur}s;`;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

// ── Lesson ──
function startLesson() { lessonStep = 0; renderLesson(); showScreen('screen-lesson'); }

function renderLesson() {
  const step = LESSON_STEPS[lessonStep];
  document.getElementById('lesson-step-label').textContent = `レッスン ${lessonStep+1}/${LESSON_STEPS.length}`;
  document.getElementById('lesson-title').innerHTML = step.title;
  document.getElementById('lesson-content').innerHTML = step.html;

  const dots = document.getElementById('lesson-step-dots');
  dots.innerHTML = '';
  LESSON_STEPS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'lesson-dot' + (i < lessonStep ? ' done' : i === lessonStep ? ' active' : '');
    dots.appendChild(d);
  });

  document.getElementById('btn-lesson-prev').style.visibility = lessonStep === 0 ? 'hidden' : 'visible';
  document.getElementById('btn-lesson-next').textContent =
    lessonStep === LESSON_STEPS.length - 1 ? 'もんだいへ ▶' : 'つぎへ ▶';
}

function lessonNext() {
  if (lessonStep < LESSON_STEPS.length - 1) { lessonStep++; renderLesson(); }
  else startQuiz();
}
function lessonPrev() { if (lessonStep > 0) { lessonStep--; renderLesson(); } }

// ── Quiz ──
function startQuiz() {
  sessionProblems = shuffle([...PROBLEMS]).slice(0, SESSION_COUNT);
  currentIdx = 0;
  correctCount = 0;
  renderQuestion();
  showScreen('screen-quiz');
}

function renderQuestion() {
  const q = sessionProblems[currentIdx];
  const total = sessionProblems.length;

  document.getElementById('progress-fill').style.width = `${currentIdx / total * 100}%`;
  document.getElementById('quiz-counter').textContent = `${currentIdx + 1} / ${total}`;

  const isBar = q.type.startsWith('bar');
  const badge = document.getElementById('q-badge');
  badge.className = 'q-badge ' + (isBar ? 'badge-bar' : 'badge-tbl');
  badge.textContent = isBar ? '棒グラフ' : '表';

  const card = document.getElementById('q-card');
  let cardHTML = `<div class="q-text">${q.q}</div>`;
  if (isBar) {
    cardHTML += renderBarGraph(q.gk, q.hl, 'quiz');
  } else {
    cardHTML += renderTableHTML(q.hlr, q.hlc);
  }
  card.innerHTML = cardHTML;

  const grid = document.getElementById('choices-grid');
  grid.innerHTML = '';
  shuffle([...q.ch]).forEach(val => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = typeof val === 'number' ? val + (q.gk === 'zoo' ? '頭' : q.type.startsWith('table') ? '人' : '人') : val;
    btn.dataset.val = val;
    btn.addEventListener('click', () => checkAnswer(val, q));
    grid.appendChild(btn);
  });

  document.getElementById('fb-area').innerHTML = '';
  document.getElementById('btn-next-quiz').classList.remove('visible');
  answered = false;
}

function getExplanation(q) {
  if (q.type === 'bar_read') {
    const G = GRAPHS[q.gk];
    const d = G.data.find(r => r.label === q.hl[0]);
    return `<strong>よみかたのコツ：</strong><br>
黄色くなっている「${q.hl[0]}」のぼうを見て、<br>
目もりのどこを さしているか かくにんしよう！<br>
ぼうの先は 目もりの <strong>${q.ans}</strong> を さしているよ。`;
  }
  if (q.type === 'bar_which') {
    const G = GRAPHS[q.gk];
    const isOoki = q.q.includes('多い');
    return `<strong>くらべかたのコツ：</strong><br>
ぼうが <strong>${isOoki ? '長い' : 'みじかい'}</strong> ほど 数が ${isOoki ? '多い' : '少ない'} よ！<br>
いちばん ${isOoki ? '長い' : 'みじかい'} ぼうを さがそう。<br>
こたえは <strong>「${q.ans}」</strong> だよ！`;
  }
  if (q.type === 'bar_diff') {
    const G = GRAPHS[q.gk];
    const d1 = G.data.find(r => r.label === q.v1);
    const d2 = G.data.find(r => r.label === q.v2);
    return `<strong>ちがいのもとめかた：</strong><br>
2本のぼうの <strong>ちがい（さ）</strong> は ひき算！<br>
${q.v1}（${d1.val}） － ${q.v2}（${d2.val}） ＝ <strong>${q.ans}</strong> だよ！`;
  }
  if (q.type === 'bar_total') {
    const G = GRAPHS[q.gk];
    const vals = G.data.map(d => d.val);
    const expr = vals.join(' ＋ ');
    return `<strong>合計のもとめかた：</strong><br>
全ての ぼうの 数を たし算しよう！<br>
${expr} ＝ <strong>${q.ans}</strong> だよ！`;
  }
  if (q.type === 'table_read') {
    return `<strong>表のよみかた：</strong><br>
「${q.hlr}」の行と 「${q.hlc}」の列が かさなるところを 見よう！<br>
黄色のマスを かくにんして → <strong>${q.ans}人</strong> だよ！`;
  }
  if (q.type === 'table_total') {
    return `<strong>合計のもとめかた：</strong><br>
「${q.hlr}」の行の 数を ぜんぶ たし算しよう！<br>
黄色のマス「合計」に こたえが 入っているよ → <strong>${q.ans}人</strong>！`;
  }
  return `こたえは <strong>${q.ans}</strong> だよ。もう一かい かんがえてみよう！`;
}

function checkAnswer(chosen, q) {
  if (answered) return;
  answered = true;

  const correct = String(chosen) === String(q.ans);

  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.disabled = true;
    if (String(btn.dataset.val) === String(q.ans)) btn.classList.add('correct');
  });
  if (!correct) {
    const wrongBtn = [...document.querySelectorAll('.choice-btn')].find(b => String(b.dataset.val) === String(chosen));
    if (wrongBtn) wrongBtn.classList.add('wrong');
  }

  const fb = document.getElementById('fb-area');
  if (correct) {
    correctCount++;
    launchConfetti();
    fb.innerHTML = `<div class="fb-result ok">✨ せいかい！</div>`;
  } else {
    const ans = q.ans;
    const unit = q.type === 'bar_read' || q.type === 'bar_diff' || q.type === 'bar_total' || q.type.startsWith('table')
      ? (q.gk === 'zoo' ? '頭' : '人') : '';
    const ansLabel = typeof ans === 'number' ? ans + unit : '「' + ans + '」';
    fb.innerHTML = `
      <div class="fb-result ng">💦 もういちど！</div>
      <div class="fb-correct-ans">こたえは ${ansLabel} だよ</div>
      <div class="exp-panel">${getExplanation(q)}</div>
    `;
  }

  document.getElementById('btn-next-quiz').classList.add('visible');
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= sessionProblems.length) showResult();
  else renderQuestion();
}

// ── Result ──
function showResult() {
  const total = sessionProblems.length;
  const pct = Math.round(correctCount / total * 100);
  let icon, title, msg;
  if (pct === 100) { icon='🏆'; title='かんぺき！すごい！'; msg='グラフと表 マスターだ！'; }
  else if (pct >= 70) { icon='🌟'; title='よくできました！'; msg='あともう少しで かんぺき！もう一かい やってみよう。'; }
  else { icon='💪'; title='もう一かい チャレンジ！'; msg='レッスンを見てから もう一かいやってみよう。'; }
  document.getElementById('result-icon').textContent  = icon;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-score').textContent = `${correctCount} / ${total}`;
  document.getElementById('result-msg').textContent   = msg;
  showScreen('screen-result');
  recordVisit();
}

// ── LocalStorage ──
function recordVisit() {
  try {
    const key = 'manabi_room_module_' + MODULE_ID;
    const data = JSON.parse(localStorage.getItem(key)) || {visitCount:0, lastVisited:null};
    data.visitCount += 1;
    data.lastVisited = Date.now();
    localStorage.setItem(key, JSON.stringify(data));
    const dayKey = new Date().toISOString().split('T')[0];
    const days = JSON.parse(localStorage.getItem('manabi_room_days')) || [];
    if (!days.includes(dayKey)) { days.push(dayKey); localStorage.setItem('manabi_room_days', JSON.stringify(days.sort())); }
  } catch (_) {}
}
